<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>JJC</title>
        <link href="styles/home.css" rel="stylesheet">
    </head>
    <body>
        <nav>
            <img id="burgerMenu"/>
            <img src="assets/RestaurantLogo/logoLightL.png" alt="Logo"/>
            <img id="userpfp"/>
            <button id="openBtn1">Sign In</button>
            <!--
            Owner - Management
            Manager - Management
            Chef - View Orders
            Waiter - View Tables
            Customer - View Menu
            -->
        </nav>
        <div class="hero">
            <div>
                <div class="slogan">
                    <p>Jaunty, Juicy</p>
                    <p>Jaw-Dropping,</p>
                    <p>Jerk.</p>
                </div>
                <button>Dine In</button>
            </div>
        </div>
        <div>
            <!--two cards-->
        </div>
        <!--hidden sign-in-->
        <div class="sign-in-popup" id="myPopup1">
                <div class="container1">
                    <img src="assets/RestaurantLogo/logoLightHQ.png" alt="Logo" class="logo"/>
                    <h1 class="title1">Order Today!</h1>
                    <p class="sub1">Sign Up or Log In</p>
                    <button  id="google" class="signinbtn">
                        <img src="assets/googleicon.png" alt="googleicon" class="googleicon"/>
                        Continue with Google
                    </button>
                    <button class="signinbtn" id="openBtn2">
                        <img src="assets/mail.png" alt="mail" id="email" class="mail"/>
                        Sign-up with Email
                    </button>
                    <button class="signinbtn" id="openBtn3">
                        Log-In
                    </button>
                </div>
            <img src="assets/exit.png" alt="x" id="closeBtn1" class="closeBtn"/>
        </div>
        <!--hidden sign-up-->
        <div class="sign-in-popup" id="myPopup2">
            <div class="container2">
                <img src="assets/RestaurantLogo/logoLightHQ.png" alt="Logo" class="logo"/>
                <h1 class="title1">Order Today!</h1>
                <p class="sub1">Sign Up or Log In</p>
                <form class="sign-up" id="signupForm">
                    <div>
                        <p class="formtitles">Email Address *</p>
                        <input type="email" placeholder="Email" id="emailInput1" class="emailInput" required/>
                        <p class="formtitles">Password *</p>
                        <input type="password" placeholder="Password" id="passwordInput1" class="passwordInput" required/>
                        <p class="formtitles">First Name  *</p>
                        <input type="text" placeholder="First Name" id="fname" class="fname" required/>
                        <p class="formtitles">Last Name *</p>
                        <input type="text" placeholder="Last Name" id="lname" class="lname" required/>
                    </div>
                    <button type="submit" id="submitBtn1" class="submitBtn">Sign Up</button>
                </form>
            </div>
            <img src="assets/bai.png" alt="arrow" id="back1" class="back"/>
            <img src="assets/exit.png" alt="x" id="closeBtn2" class="closeBtn"/>
        </div>
        <!--hidden login-->
        <div class="sign-in-popup" id="myPopup3">
            <div class="container3">
                <img src="assets/RestaurantLogo/logoLightHQ.png" alt="Logo" class="logo"/>
                <h1 class="title1">Order Today!</h1>
                <p class="sub1">Log In</p>
                <form class="sign-up" id="loginForm">
                    <div>
                        <p class="formtitles">Email Address *</p>
                        <input type="email" placeholder="Email" id="emailInput2" class="emailInput" required/>
                        <p class="formtitles">Password *</p>
                        <input type="password" placeholder="Password" id="passwordInput2" class="passwordInput" required/>
                    </div>
                    <button type="submit" id="submitBtn2" class="submitBtn">Sign Up</button>
                </form>
            </div>
            <img src="assets/bai.png" alt="arrow" id="back2" class="back"/>
            <img src="assets/exit.png" alt="x" id="closeBtn3" class="closeBtn"/>
        <script type="module" src="script.js"></script>
    </body>
</html>
