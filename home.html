<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>JJ-BBQ</title>
        <link id="" href="styles/home.css" rel="stylesheet">
    </head>
    <body>
        <nav>
            <img id="burgerMenu"/>
            <img src="assets/RestaurantLogo/logoLightL.png" alt="Logo"/>
            <img id="userpfp"/>
            <button id="openBtn">Sign In</button>
            <!--
            Owner - Management
            Manager - Management
            Chef - View Orders
            Waiter - View Tables
            Customer - View Menu
            -->
        </nav>
        <div class="hero">
            <div>
                <div class="slogan">
                    <p>Jaunty, Juicy</p>
                    <p>Jaw-Dropping,</p>
                    <p>Jerk.</p>
                </div>
                <button>Dine In</button>
                <button>Order Delivery</button>
            </div>
            <div class="heroImg">
                <img src="assets/Jerk.png" alt="jerk" class="jerk"/>
            </div>
        </div>
        <div>
            <!--two cards-->
        </div>
        <!--hidden sign-in-->
        <div class="sign-in-popup" id="myPopup">
            <div class="container">
                <img src="assets/RestaurantLogo/logoLightHQ.png" alt="Logo" class="logo"/>
                <h1>Order Today!</h1>
                <p>Sign Up or Log In</p>
                <button>
                    <img />
                    Continue with Google
                </button>
                <button>
                    <img/>
                    Continue with Email
                </button>
            </div>
            <button id="closeBtn" class="closeBtn">Close</button>
        </div>
        <script type="module" src="script.js"></script>
    </body>
</html>
