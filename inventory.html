<!DOCTYPE HTML>
<html lang=en>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>JJC</title>
        <link href="styles/inventory.css" rel="stylesheet">
    </head>
    <body>
        <nav>
            <div class="BM">
                <img src="assets/Vector.png" alt="burgerMenu" id="burgerMenu" class="burgerMenu"/>
            </div>
            <div class="nav-alignment1">
                <img src="assets/RestaurantLogo/logoLightL.png" alt="Logo"/>
                <p>Smoky Goodness In Every Bite</p>
            </div>
            <div class="nav-alignment2">
                <img src="assets/userpfp.png" alt="userpfp" id="userpfp"/>
                <button class="navsigninBtn" id="openBtn1">Sign In</button>
            </div>
            <!--
            Owner - Management
            Manager - Management
            Chef - View Orders
            Waiter - View Tables
            Customer - View Menu
            -->
        </nav>
        <h1> Supplies </h1>
        <div class="order-form-container">
            <form id="inventoryOrderForm">
                <input type="text" id="itemName" placeholder="Item Name" required>
                <input type="number" id="itemAmount" placeholder="Amount" min="1" required>
                <button type="submit" id="completeOrderBtn">Complete Order</button>
            </form>
        </div>
        <div class="stock_align"> 
        <div class="container">
            <div class="heading">
                <p class="item_Name"> Item Name: </p>
                <p class="price"> Price </p>
                <p class="total"> Total Bought </p>
                <p class="remaining"> Left In Stock </p>
            </div>
            <div id="inventoryList"></div>
        </div>
        </div>

        <script type="module" src="script.js"></script>  
    </body>
    </html>
